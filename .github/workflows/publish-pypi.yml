name: publish-pypi

# Publishes compile-pdf-impose to PyPI when a v*.*.* tag is pushed.
#
# Auth: TOKEN — uses the PYPI_TOKEN repo secret for upload authentication.
# Set the secret at Settings → Secrets → Actions → PYPI_TOKEN with a
# PyPI API token scoped to the compile-pdf-impose project.
#
# The `environment: release` block and `id-token: write` permission are
# retained (harmless) in case Trusted Publishing is registered later.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade pip build
      - run: python -m build --sdist --wheel --outdir dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/compile-pdf-impose/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
